databases:
  - name: survey-db
    plan: free
    databaseName: survey_db
    user: survey_user

services:
  - type: web
    name: survey-builder
    runtime: docker
    plan: free
    envVars:
      - key: JDBC_DATABASE_URL
        value: jdbc:postgresql://${databases.survey_db.host}:${databases.survey_db.port}/${databases.survey_db.database}?sslmode=require
      - key: JDBC_DATABASE_USERNAME
        value: ${databases.survey_db.user}
      - key: JDBC_DATABASE_PASSWORD
        value: ${databases.survey_db.password}
      - key: JDBC_DATABASE_DRIVER
        value: org.postgresql.Driver
      - key: JPA_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
