<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormCraft | Survey Results</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="glow-bg"></div>
    <div class="bg-decorations">
        <i class="fa-solid fa-list-check decor-item decor-item-1"></i>
        <i class="fa-solid fa-file-lines decor-item decor-item-2"></i>
        <i class="fa-solid fa-square-poll-horizontal decor-item decor-item-3"></i>
        <i class="fa-solid fa-chart-simple decor-item decor-item-4"></i>
        <i class="fa-solid fa-folder-open decor-item decor-item-5"></i>
        <i class="fa-solid fa-pen-to-square decor-item decor-item-6"></i>
        <i class="fa-solid fa-circle-question decor-item decor-item-7"></i>
        <i class="fa-solid fa-square-check decor-item decor-item-8"></i>
    </div>
    <div class="app-container">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-square-poll-vertical logo-icon"></i>
                <span class="logo-text">FormCraft</span>
            </div>
            <nav class="nav-links">
                <a href="index.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="index.html?action=new"><i class="fa-solid fa-plus"></i> Create Survey</a>
            </nav>
            
            <!-- Dancing Sequencer Matrix Grid -->
            <div class="dancing-grid-container">
                <div class="dancing-grid">
                    <!-- Row 1 -->
                    <div class="grid-cell" style="--delay: 1;">
                        <div class="bar bar-white"></div>
                        <div class="bar bar-white"></div>
                        <div class="bar bar-green"></div>
                    </div>
                    <div class="grid-cell" style="--delay: 3;">
                        <div class="bar bar-pink"></div>
                        <div class="bar bar-white"></div>
                        <div class="bar bar-pink"></div>
                    </div>
                    <div class="grid-cell dot-cell" style="--delay: 2;">
                        <div class="dot dot-white"></div>
                        <div class="dot"></div>
                        <div class="dot dot-white"></div>
                        <div class="dot"></div>
                        <div class="dot dot-white"></div>
                        <div class="dot"></div>
                        <div class="dot dot-white"></div>
                        <div class="dot"></div>
                        <div class="dot dot-white"></div>
                    </div>
                    <div class="grid-cell" style="--delay: 5;">
                        <div class="bar bar-white"></div>
                        <div class="bar bar-white"></div>
                        <div class="bar bar-green"></div>
                    </div>
                    <div class="grid-cell" style="--delay: 4;">
                        <div class="bar bar-white"></div>
                        <div class="bar bar-white"></div>
                        <div class="bar bar-white"></div>
                    </div>
            
                    <!-- Row 2 -->
                    <div class="grid-cell empty-cell"></div>
                    <div class="grid-cell empty-cell"></div>
                    <div class="grid-cell" style="--delay: 4;">
                        <div class="bar bar-white"></div>
                        <div class="bar bar-pink"></div>
                        <div class="bar bar-white"></div>
                    </div>
                    <div class="grid-cell" style="--delay: 1;">
                        <div class="bar bar-pink"></div>
                        <div class="bar bar-white"></div>
                        <div class="bar bar-white"></div>
                    </div>
                    <div class="grid-cell dot-cell" style="--delay: 3;">
                        <div class="dot dot-white"></div>
                        <div class="dot dot-white"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot dot-white"></div>
                        <div class="dot"></div>
                        <div class="dot dot-white"></div>
                        <div class="dot dot-white"></div>
                        <div class="dot"></div>
                    </div>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <p>Status: <span class="status-online"><i class="fa-solid fa-circle"></i> Connected</span></p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="welcome-text">
                    <h1 id="results-survey-title">Analytics</h1>
                    <p id="results-survey-desc">Loading survey description...</p>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-secondary" onclick="location.href='index.html'"><i class="fa-solid fa-arrow-left"></i> Dashboard</button>
                </div>
            </header>

            <!-- Results View -->
            <section class="view-panel">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue"><i class="fa-solid fa-reply-all"></i></div>
                        <div class="stat-info">
                            <span class="stat-label">Total Responses</span>
                            <span class="stat-value" id="results-count">0</span>
                        </div>
                    </div>
                </div>

                <div class="section-header">
                    <h2>Question Summary</h2>
                </div>

                <div id="results-loading" class="survey-loader">
                    <i class="fa-solid fa-spinner fa-spin loader-icon"></i>
                    <p>Loading Analytics...</p>
                </div>

                <!-- List of compiled answers per question -->
                <div class="results-container hidden" id="results-content"></div>
            </section>
        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initSurveyResults();
        });
    </script>
</body>
</html>
